<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" href="SM.png">
    <meta property="og:title"
        content="SYSTEM METRIC" />
    <meta property="og:image"
        content="SM.png" />
    <meta property="og:url"
        content="https://.vercel.app" />
    <meta property="og:description"
        content="A professional dashboard habit tracking app." />
    <meta property="og:type"
        content="website" />
    <title>System Metric</title>
    
    <script
        src="https://cdn.tailwindcss.com">
    </script>
    <script
        src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0">
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="tracker.css">
</head>

<body
    class="dark-theme antialiased pb-20">
    
    <div id="systemLoader"
        class="fixed inset-0 z-[100] bg-[#0f172a] flex items-center justify-center transition-opacity duration-700">
        <div
            class="relative flex flex-col items-center">
            <div
                class="relative w-20 h-20 mb-8">
                <div
                    class="absolute inset-0 border-t-2 border-r-2 border-indigo-500 rounded-full animate-spin">
                </div>
                <div
                    class="absolute inset-3 border-b-2 border-l-2 border-indigo-400/30 rounded-full animate-spin-reverse">
                </div>
                <div
                    class="absolute inset-7 bg-indigo-500 rounded-full shadow-[0_0_20px_rgba(99,102,241,0.6)] animate-pulse">
                </div>
            </div>
            
            <div
                class="text-center w-48">
                <h1
                    class="text-xl font-black tracking-[0.1em] italic text-white mb-4">
                    SYSTEM<span
                        class="text-indigo-500">METRIC</span>
                </h1>
                
                <div
                    class="w-full h-[2px] bg-white/5 rounded-full overflow-hidden relative">
                    <div
                        class="loading-bar-fill absolute top-0 left-0 h-full bg-indigo-500 shadow-[0_0_10px_#6366f1]">
                    </div>
                </div>
                <p
                    class="text-[7px] font-black uppercase tracking-[0.4em] text-indigo-500/40 mt-3 animate-pulse">
                    Initializing Data
                </p>
            </div>
        </div>
    </div>
    
    
    <div id="confirmModal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm px-6">
        <div id="modalContent"
            class="glass-card max-w-[320px] w-full p-6 rounded-2xl text-center">
        </div>
    </div>
    
    <div id="mainApp"
        class="max-w-6xl mx-auto px-6 py-8">
        <header
            class="flex justify-between items-center mb-3">
            <div>
                <h1
                    class="text-2xl font-black tracking-tighter italic">
                    SYSTEM<span
                        class="text-indigo-500">METRIC</span>
                </h1>
                <p id="currentDateDisplay"
                    class="opacity-40 text-[10px] font-bold uppercase tracking-widest">
                </p>
            </div>
            <button
                onclick="toggleTheme()"
                class="glass-card w-10 h-10 flex items-center justify-center rounded-xl hover:scale-105 active:scale-95">
                <span
                    id="themeIcon">🌙</span>
            </button>
        </header>
        
        <div
            class="glass-card p-5 rounded-2xl mb-5 border-indigo-500/10 flex items-center gap-4">
            <div
                class="flex-shrink-0 w-10 h-10 rounded-full bg-indigo-500/10 flex items-center justify-center">
                <svg class="w-5 h-5 text-indigo-500"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path
                        d="M13 10V3L4 14h7v7l9-11h-7z"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <div>
                <h4
                    class="text-[9px] font-black uppercase tracking-[0.2em] text-indigo-500 mb-1">
                    Daily Protocol</h4>
                <p id="quoteText"
                    class="text-sm md:text-base font-medium opacity-80 italic leading-relaxed">
                    "Loading
                    objectives..."</p>
            </div>
        </div>
        
        <div
            class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div
                class="lg:col-span-5 space-y-6">
                <div
                    class="flex items-end justify-between px-1">
                    <div>
                        <h3 id="registryTitle"
                            class="text-xs font-black uppercase tracking-[0.2em] text-indigo-500">
                            Registry
                        </h3>
                        <p
                            class="text-[11px] opacity-40 mt-1">
                            Track daily
                            performance
                        </p>
                    </div>
                    <div
                        class="text-right">
                        <span
                            id="progressPercent"
                            class="text-2xl font-light tracking-tighter">0%</span>
                        <p
                            class="text-[9px] font-bold opacity-30 uppercase">
                            Work Done
                        </p>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <input
                        id="habitInput"
                        type="text"
                        placeholder="Type new metric..."
                        class="bg-[var(--input-bg)] border border-[var(--border)] rounded-xl px-4 py-3 outline-none flex-1 text-sm shadow-inner focus:border-indigo-500/50">
                    <button
                        onclick="addHabit()"
                        class="bg-indigo-600 hover:bg-indigo-500 text-white font-black px-6 rounded-xl text-xs uppercase tracking-widest transition-transform active:scale-95">Add</button>
                </div>
                
                <div id="habitList"
                    class="space-y-3">
                </div>
            </div>
            
            <div
                class="lg:col-span-7 space-y-6">
                <div
                    class="glass-card p-6 rounded-3xl">
                    <div
                        class="flex justify-between items-center mb-6">
                        <h3
                            class="text-[10px] font-black opacity-30 uppercase tracking-widest">
                            Consistency
                            Vector</h3>
                        <span
                            class="text-[9px] bg-indigo-500/10 text-indigo-500 px-2 py-1 rounded-md font-bold">Line
                            View</span>
                    </div>
                    <div
                        class="chart-container">
                        <canvas
                            id="lineChart"></canvas>
                    </div>
                </div>
                
                <div
                    class="glass-card p-6 rounded-3xl">
                    <div
                        class="flex justify-between items-center mb-6">
                        <h3
                            class="text-[10px] font-black opacity-30 uppercase tracking-widest">
                            Volume
                            Distribution
                        </h3>
                        <span
                            class="text-[9px] bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded-md font-bold">Bar
                            View</span>
                    </div>
                    <div
                        class="chart-container">
                        <canvas
                            id="barChart"></canvas>
                    </div>
                </div>
                <div
                    class="glass-card p-6 rounded-3xl">
                    <div
                        class="flex justify-between items-center mb-6">
                        <h3
                            class="text-[10px] font-black opacity-30 uppercase tracking-widest">
                            Weekly
                            Records
                        </h3>
                        <span
                            class="text-[9px] bg-indigo-500/10 text-indigo-500 px-2 py-1 rounded-md font-bold">Grid
                            View</span>
                    </div>
                    <div id="efficiencyGrid"
                        class="flex flex-wrap gap-3">
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="tracker.js"></script>
</body>

</html>
